<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PalettenStation Live-Monitor</title>
    <style>
        /* ============================================ */
        /* B1 — Reset & Grundlayout                     */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        /* ============================================ */
        /* B2 — Header                                  */
        /* ============================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: #131a2e;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 22px;
            margin-bottom: 4px;
        }

        .header .subtitle {
            color: #666;
            font-size: 12px;
            font-family: 'Consolas', monospace;
        }

        .header-right {
            text-align: right;
        }

        .uhrzeit {
            color: #888;
            font-size: 13px;
            margin-top: 6px;
            font-family: 'Consolas', monospace;
        }

        .ads-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a2340;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
            transition: background 0.3s;
        }

        .dot.connected {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .dot.disconnected {
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
        }

        /* ============================================ */
        /* B3 — Card-Container (allgemein)              */
        /* ============================================ */
        .card {
            background: #131a2e;
            border-radius: 10px;
            padding: 20px 25px;
            margin-bottom: 20px;
        }

        .card-title {
            color: #00d4ff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        /* ============================================ */
        /* B4 — Stepper (Schrittkette S0–S9)            */
        /* ============================================ */
        .stepper-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stepper-normal, .stepper-alarm {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stepper-separator {
            color: #333;
            font-size: 24px;
            margin: 0 10px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1a2340;
            border: 2px solid #2a3550;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        .step-label {
            color: #555;
            font-size: 10px;
            margin-top: 6px;
            text-align: center;
            max-width: 60px;
            line-height: 1.2;
        }

        /* Aktiver Schritt (normal S0–S7) */
        .step.active .step-circle {
            background: #00d4ff;
            border-color: #00d4ff;
            color: #0a0e17;
            box-shadow: 0 0 12px #00d4ff;
            transform: scale(1.15);
        }

        .step.active .step-label {
            color: #00d4ff;
            font-weight: bold;
        }

        /* Aktiver Schritt (Alarm-Zweig S8/S9) */
        .step.active.alarm .step-circle {
            background: #ff4444;
            border-color: #ff4444;
            color: #fff;
            box-shadow: 0 0 12px #ff4444;
        }

        .step.active.alarm .step-label {
            color: #ff4444;
        }

        .schritt-text {
            text-align: center;
            color: #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            padding: 12px;
            background: #1a2340;
            border-radius: 6px;
        }

        /* ============================================ */
        /* B5 — Messwerte + Alarm-Panel + Footer        */
        /* ============================================ */
        .messwerte-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .messwert-card {
            padding: 25px;
        }

        .messwert-label {
            color: #00d4ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .messwert-value {
            font-size: 42px;
            font-weight: bold;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            margin-bottom: 15px;
        }

        .balken-bg {
            background: #1a2340;
            border-radius: 5px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .balken-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border-radius: 5px;
            transition: width 0.5s ease, background 0.3s;
            width: 0%;
        }

        .balken-fill.warn {
            background: linear-gradient(90deg, #ffaa00, #ff8800);
        }

        .balken-fill.alarm {
            background: linear-gradient(90deg, #ff4444, #ff8800);
        }

        .messwert-range {
            color: #555;
            font-size: 11px;
        }

        /* Alarm-Panel */
        .alarm-panel {
            text-align: center;
            padding: 30px;
            border-left: 4px solid #00ff88;
            transition: border-color 0.3s;
        }

        .alarm-panel.active {
            border-left-color: #ff4444;
            animation: pulse 1.2s infinite;
        }

        .alarm-label {
            color: #00d4ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .alarm-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }

        .alarm-panel.active .alarm-value {
            color: #ff4444;
        }

        @keyframes pulse {
            0%, 100% { background: #131a2e; }
            50%      { background: #2a1520; }
        }

        .footer {
            text-align: center;
            color: #333;
            margin-top: 20px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- ============================================ -->
    <!-- 1. HEADER — Titel + ADS-Verbindungsstatus    -->
    <!-- ============================================ -->
    <div class="header">
        <div class="header-left">
            <h1>PalettenStation Live-Monitor</h1>
            <div class="subtitle">Live-Daten von CP6606 · AMS 5.35.203.54.1.1</div>
        </div>
        <div class="header-right">
            <div class="ads-status" id="adsStatus">
                <span class="dot" id="adsDot"></span>
                <span id="adsText">verbinde …</span>
            </div>
            <div class="uhrzeit" id="uhrzeit"></div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 2. STEPPER — Schrittkette S0–S9              -->
    <!-- ============================================ -->
    <div class="card">
        <div class="card-title">Prozessschritt</div>
        <div class="stepper-container">
            <div class="stepper-normal" id="stepperNormal">
                <!-- S0–S7 werden per JS erzeugt -->
            </div>
            <div class="stepper-separator">|</div>
            <div class="stepper-alarm" id="stepperAlarm">
                <!-- S8–S9 werden per JS erzeugt -->
            </div>
        </div>
        <div class="schritt-text" id="schrittText">–</div>
    </div>

    <!-- ============================================ -->
    <!-- 3. MESSWERTE — Folien- und Motortemperatur   -->
    <!-- ============================================ -->
    <div class="messwerte-grid">
        <div class="card messwert-card" id="folienCard">
            <div class="messwert-label">Folientemperatur</div>
            <div class="messwert-value" id="folienValue">–</div>
            <div class="balken-bg">
                <div class="balken-fill" id="folienBar"></div>
            </div>
            <div class="messwert-range">Bereich: 100–180 °C</div>
        </div>

        <div class="card messwert-card" id="motorCard">
            <div class="messwert-label">Motortemperatur</div>
            <div class="messwert-value" id="motorValue">–</div>
            <div class="balken-bg">
                <div class="balken-fill" id="motorBar"></div>
            </div>
            <div class="messwert-range">Bereich: 20–70 °C</div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 4. ALARM-PANEL                                -->
    <!-- ============================================ -->
    <div class="card alarm-panel" id="alarmPanel">
        <div class="alarm-label">Anlagenstatus</div>
        <div class="alarm-value" id="alarmValue">OK</div>
    </div>

    <div class="footer">
        Industrial SCADA Dashboard v1.2.1 · Florian Englmeier · 2026
    </div>

    <script>
        // ============================================
        // C1 — KONFIGURATION (alle "magischen Zahlen") 
        // ============================================
        const REFRESH_MS = 2000;

        const SCHRITT_LABELS = [
            { nr: 0, label: "Bereit" },
            { nr: 1, label: "Transport" },
            { nr: 2, label: "Stopp" },
            { nr: 3, label: "Hub hoch" },
            { nr: 4, label: "Temp" },
            { nr: 5, label: "Bearbeitung" },
            { nr: 6, label: "Hub runter" },
            { nr: 7, label: "Ablauf" }
        ];

        const SCHRITT_ALARM = [
            { nr: 8, label: "ALARM" },
            { nr: 9, label: "Quitt." }
        ];

        const FOLIEN_MIN = 0;
        const FOLIEN_MAX = 200;
        const FOLIEN_OK_LOW = 100;
        const FOLIEN_OK_HIGH = 180;

        const MOTOR_MIN = 0;
        const MOTOR_MAX = 100;
        const MOTOR_OK_HIGH = 70;

        // ============================================
        // C2 — Stepper einmalig aufbauen
        // ============================================
        function baueStepper() {
            const normal = document.getElementById('stepperNormal');
            const alarm = document.getElementById('stepperAlarm');

            SCHRITT_LABELS.forEach(s => {
                normal.innerHTML += `
                    <div class="step" id="step-${s.nr}">
                        <div class="step-circle">${s.nr}</div>
                        <div class="step-label">S${s.nr}<br>${s.label}</div>
                    </div>
                `;
            });

            SCHRITT_ALARM.forEach(s => {
                alarm.innerHTML += `
                    <div class="step alarm" id="step-${s.nr}">
                        <div class="step-circle">${s.nr}</div>
                        <div class="step-label">S${s.nr}<br>${s.label}</div>
                    </div>
                `;
            });
        }

        // ============================================
        // C3 — Uhrzeit
        // ============================================
        function updateUhrzeit() {
            const jetzt = new Date();
            document.getElementById('uhrzeit').textContent =
                jetzt.toLocaleTimeString('de-DE') + ' · ' +
                jetzt.toLocaleDateString('de-DE');
        }

        // ============================================
        // C4 — Live-Daten laden
        // ============================================
        async function laden() {
            try {
                const response = await fetch('/api/sensor/live');

                if (!response.ok) {
                    setzeAdsStatus(false);
                    return;
                }

                const daten = await response.json();

                setzeAdsStatus(daten.connected);
                setzeAktivenSchritt(daten.schritt);
                document.getElementById('schrittText').textContent = daten.schrittText;
                setzeFolienTemperatur(daten.folienTemperatur);
                setzeMotorTemperatur(daten.motorTemperatur);
                setzeAlarm(daten.alarmAktiv);

            } catch (fehler) {
                console.error('API-Fehler:', fehler);
                setzeAdsStatus(false);
            }
        }

        // ============================================
        // C5 — UI-Setzer (einer pro Widget)
        // ============================================
        function setzeAdsStatus(verbunden) {
            const dot = document.getElementById('adsDot');
            const text = document.getElementById('adsText');

            dot.classList.remove('connected', 'disconnected');
            if (verbunden) {
                dot.classList.add('connected');
                text.textContent = 'ADS verbunden';
            } else {
                dot.classList.add('disconnected');
                text.textContent = 'ADS getrennt';
            }
        }

        function setzeAktivenSchritt(schrittNr) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            const aktiv = document.getElementById(`step-${schrittNr}`);
            if (aktiv) aktiv.classList.add('active');
        }

        function setzeFolienTemperatur(wert) {
            document.getElementById('folienValue').textContent = `${wert.toFixed(1)} °C`;

            const prozent = ((wert - FOLIEN_MIN) / (FOLIEN_MAX - FOLIEN_MIN)) * 100;
            const clamped = Math.min(Math.max(prozent, 0), 100);
            const bar = document.getElementById('folienBar');
            bar.style.width = clamped + '%';

            bar.classList.remove('warn', 'alarm');
            if (wert < FOLIEN_OK_LOW || wert > FOLIEN_OK_HIGH) {
                bar.classList.add('alarm');
            }
        }

        function setzeMotorTemperatur(wert) {
            document.getElementById('motorValue').textContent = `${wert.toFixed(1)} °C`;

            const prozent = ((wert - MOTOR_MIN) / (MOTOR_MAX - MOTOR_MIN)) * 100;
            const clamped = Math.min(Math.max(prozent, 0), 100);
            const bar = document.getElementById('motorBar');
            bar.style.width = clamped + '%';

            bar.classList.remove('warn', 'alarm');
            if (wert > MOTOR_OK_HIGH) {
                bar.classList.add('alarm');
            }
        }

        function setzeAlarm(aktiv) {
            const panel = document.getElementById('alarmPanel');
            const value = document.getElementById('alarmValue');

            if (aktiv) {
                panel.classList.add('active');
                value.textContent = 'ALARM';
            } else {
                panel.classList.remove('active');
                value.textContent = 'OK';
            }
        }

        // ============================================
        // C6 — Start
        // ============================================
        baueStepper();
        updateUhrzeit();
        laden();

        setInterval(updateUhrzeit, 1000);
        setInterval(laden, REFRESH_MS);
    </script>
</body>
</html>
